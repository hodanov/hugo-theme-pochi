<div class="share-sidebar" data-share-root>
  <button
    class="share-btn"
    type="button"
    aria-pressed="false"
    title="{{ T "copy_url" }}"
    data-share-button
    data-share-url="{{ .Permalink }}"
    data-share-title="{{ .Title }}"
    data-feedback-copied="{{ T "url_copied" }}"
    data-feedback-failed="{{ T "copy_failed" }}"
  >
    {{ partial "atoms/icon.html" (dict "id" "icon-share") }}
    <span
      class="u-visually-hidden"
      data-share-feedback
      aria-live="polite"
    ></span>
  </button>

  {{/* SNS share links — desktop sidebar only (hidden on mobile via CSS) */}}
  {{- $parsed := urls.Parse .Permalink -}}
  <a
    class="sns-share-link"
    href="https://b.hatena.ne.jp/entry/s/{{ $parsed.Host }}{{ $parsed.Path }}"
    target="_blank"
    rel="noopener noreferrer"
    title="{{ T "share_on_hatena" }}"
    aria-label="{{ T "share_on_hatena" }}"
  >
    {{ partial "atoms/icon.html" (dict "id" "icon-hatena-bookmark") }}
  </a>
</div>
