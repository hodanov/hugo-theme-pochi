name: Vendor Libraries Auto Update

on:
  schedule:
    - cron: "0 3 * * 1" # Every Monday at 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-vendors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 25
          cache: npm

      - name: Show Node and npm versions
        run: node -v && npm -v

      - name: Install dependencies
        run: npm ci

      - name: Upgrade vendors to latest (may include majors)
        run: npm run vendor:upgrade:major

      - name: Verify vendor lock/hashes
        run: npm run vendor:verify

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore(vendor): upgrade Fuse/Mark/modern-normalize to latest and sync vendor"
          title: "chore(vendor): upgrade Fuse/Mark/modern-normalize to latest"
          body: |
            This PR was created automatically to upgrade vendored libraries to their latest versions and sync them into `assets/` via Hugo Pipes.

            - Updated devDependencies (fuse.js, mark.js, modern-normalize) using npm-check-updates
            - Synced vendored files and updated VENDOR.lock.json
            - Verified hashes with `npm run vendor:verify`

            Review notes:
            - Fuse.js may introduce behavior changes across major versions. Please verify search quality and performance.
            - modern-normalize updates may affect browser normalization. Please verify visual consistency.
          branch: chore/vendor-auto-update
          delete-branch: true
          labels: dependencies,vendor,automation
